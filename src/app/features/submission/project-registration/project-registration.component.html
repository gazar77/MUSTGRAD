<div class="registration-container">
    <div class="registration-card">
        <header class="card-header">
            <div class="title-meta">
                <h1>{{ pageTitle }}</h1>
                <p>{{ instructions }}</p>
            </div>
            <div class="deadline-badge">
                <i class="fas fa-clock"></i>
                <div>
                    <span>آخر موعد للتقديم</span>
                    <strong>{{ deadline | date:'fullDate' }}</strong>
                </div>
            </div>
        </header>

        <section class="upload-section">
            <div class="upload-box" [class.has-file]="selectedFile">
                <label for="reg-file" class="upload-label">
                    <i class="fas" [ngClass]="selectedFile ? 'fa-file-check' : 'fa-file-upload'"></i>
                    <div class="label-text">
                        <span class="main-text">{{ selectedFile ? selectedFile.name : 'اسحب الملف هنا لرفعه' }}</span>
                        <span class="sub-text">يدعم ملفات PDF, DOCX (بحد أقصى 10 ميجابايت)</span>
                    </div>
                    <input type="file" id="reg-file" (change)="onFileChange($event)" hidden>
                </label>
                <button *ngIf="selectedFile" class="btn-remove" (click)="selectedFile = null">
                    <i class="fas fa-times"></i>
                </button>
            </div>
        </section>

        <section class="notes-section">
            <label>ملاحظات إضافية (اختياري)</label>
            <textarea [(ngModel)]="notes" rows="4" placeholder="اكتب أي ملاحظات تود إرفاقها مع المستندات..."></textarea>
        </section>

        <footer class="card-footer">
            <button class="btn btn-outline" routerLink="/dashboard">إلغاء</button>
            <button class="btn btn-primary" [disabled]="!selectedFile" (click)="onSubmit()">
                <i class="fas fa-paper-plane"></i>
                إرسال المستندات
            </button>
        </footer>
    </div>

    <!-- Helpful Tips -->
    <div class="tips-grid">
        <div class="tip-card">
            <i class="fas fa-shield-alt"></i>
            <h4>تأكد من صحة البيانات</h4>
            <p>راجع الملفات المرفقة جيداً قبل الإرسال.</p>
        </div>
        <div class="tip-card">
            <i class="fas fa-lock"></i>
            <h4>خصوصية تامة</h4>
            <p>يتم تشفير كافة الملفات المرفقة.</p>
        </div>
        <div class="tip-card">
            <i class="fas fa-headset"></i>
            <h4>تحتاج مساعدة؟</h4>
            <p>تواصل مع الدعم الفني للكلية.</p>
        </div>
    </div>
</div>
