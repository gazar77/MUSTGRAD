<div class="management-container card">
    <div class="table-header">
        <h2>{{ title }}</h2>
        <button class="btn btn-primary" (click)="onAdd()">
            <i class="fas fa-plus"></i> إضافة جديد
        </button>
    </div>

    <div class="table-responsive">
        <table class="m-table">
            <thead>
                <tr>
                    <th *ngFor="let col of columns">{{ col.label }}</th>
                    <th class="actions-col">الإجراءات</th>
                </tr>
            </thead>
            <tbody>
                <tr *ngFor="let item of items">
                    <td *ngFor="let col of columns">
                        <ng-container [ngSwitch]="col.key">
                            <span *ngSwitchCase="'date'">{{ item[col.key] | date:'shortDate' }}</span>
                            <span *ngSwitchDefault>{{ item[col.key] }}</span>
                        </ng-container>
                    </td>
                    <td class="actions-cell">
                        <button class="action-btn edit" (click)="onEdit(item)" title="تعديل">
                            <i class="fas fa-edit"></i>
                        </button>
                        <button class="action-btn delete" (click)="onDelete(item)" title="حذف">
                            <i class="fas fa-trash-alt"></i>
                        </button>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <div class="empty-state" *ngIf="items.length === 0">
        <i class="fas fa-box-open"></i>
        <p>لا توجد بيانات متاحة حالياً.</p>
    </div>
</div>
