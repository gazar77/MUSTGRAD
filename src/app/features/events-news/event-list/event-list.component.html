<div class="events-page">
  <!-- Hero Section -->
  <header class="events-hero">
    <div class="container">
      <div class="hero-content">
        <h1>الفعاليات والأحداث</h1>
        <p>تابع أحدث المؤتمرات، ورش العمل، ومناقشات مشاريع التخرج في كلية الحاسبات والمعلومات.</p>
      </div>
    </div>
  </header>

  <!-- Events Grid Section -->
  <section class="events-section">
    <div class="container">
      <div class="events-grid">
        <article class="event-card" *ngFor="let event of events">
          <div class="event-image">
            <img [src]="event.image" [alt]="event.title">
            <span class="category-badge" [ngClass]="event.category">{{ getCategoryLabel(event.category) }}</span>
          </div>
          <div class="event-content">
            <div class="event-meta">
              <span class="meta-item"><i class="fas fa-calendar-alt"></i> {{ event.date }}</span>
              <span class="meta-item"><i class="fas fa-clock"></i> {{ event.time }}</span>
            </div>
            <h3 class="event-title">{{ event.title }}</h3>
            <p class="event-desc">{{ event.description }}</p>
            <div class="event-footer">
              <span class="location"><i class="fas fa-map-marker-alt"></i> {{ event.location }}</span>
              <button class="btn btn-outline">التفاصيل</button>
            </div>
          </div>
        </article>
      </div>
    </div>
  </section>
</div>
