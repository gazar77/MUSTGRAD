<div class="templates-page container">
    <header class="page-header">
        <h1>مكتبة القوالب والنماذج</h1>
        <p>قم بتحميل الملفات الإرشادية والقوالب المطلوبة لمشروع تخرجك</p>
    </header>

    <div class="templates-grid">
        <div *ngFor="let template of templates" class="template-card card">
            <div class="template-icon">
                <i class="fas" [ngClass]="{
                    'fa-file-word': template.type === 'DOCX',
                    'fa-file-powerpoint': template.type === 'PPTX',
                    'fa-file-pdf': template.type === 'PDF'
                }"></i>
            </div>
            <div class="template-info">
                <h3>{{ template.title }}</h3>
                <p>{{ template.description }}</p>
                <span class="version">آخر تحديث: {{ template.version }}</span>
            </div>
            <a [href]="template.url" class="btn btn-secondary">تحميل ({{ template.type }})</a>
        </div>
    </div>
</div>
