<div class="auth-page">
    <div class="auth-card card">
        <div class="auth-header">
            <img src="assets/must-logo.png" alt="MUST Logo">
            <h2>تسجيل الدخول</h2>
            <p>بوابة مشاريع التخرج - كلية الحاسبات والمعلومات</p>
        </div>

        <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="auth-form">
            <div class="form-group">
                <label for="email">البريد الإلكتروني الجامعي</label>
                <input type="email" id="email" formControlName="email" placeholder="example@must.edu.eg">
                <div *ngIf="f['email'].touched && f['email'].errors" class="error-msg">
                    <small *ngIf="f['email'].errors['required']">البريد الإلكتروني مطلوب</small>
                    <small *ngIf="f['email'].errors['email']">برجاء إدخال بريد إلكتروني صحيح</small>
                </div>
            </div>

            <div class="form-group">
                <label for="password">كلمة المرور</label>
                <input type="password" id="password" formControlName="password" placeholder="********">
                <div *ngIf="f['password'].touched && f['password'].errors" class="error-msg">
                    <small *ngIf="f['password'].errors['required']">كلمة المرور مطلوبة</small>
                </div>
            </div>

            <button type="submit" class="btn btn-primary w-full" [disabled]="loginForm.invalid || isLoading">
                <span *ngIf="!isLoading">دخول</span>
                <span *ngIf="isLoading">جاري التحميل...</span>
            </button>

            <div class="auth-links">
                <span>ليس لديك حساب؟</span>
                <a routerLink="/auth/register">إنشاء حساب جديد</a>
            </div>
        </form>
    </div>
</div>
