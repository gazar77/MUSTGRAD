<div class="ideas-page container">
    <header class="page-header">
        <h1>تصفح أفكار مشاريع التخرج</h1>
        <p>استعرض الأفكار المقترحة من قبل السادة أعضاء هيئة التدريس</p>
    </header>

    <div class="filters-section card">
        <div class="search-box">
            <input type="text" placeholder="بحث عن فكرة مشروع..." [(ngModel)]="searchQuery" (input)="filterIdeas()">
        </div>
        <div class="filter-group">
            <select [(ngModel)]="selectedCategory" (change)="filterIdeas()">
                <option value="">جميع الفئات</option>
                <option *ngFor="let cat of categories" [value]="cat">{{ cat }}</option>
            </select>
            <select [(ngModel)]="selectedStatus" (change)="filterIdeas()">
                <option value="">جميع الحالات</option>
                <option value="Open">متاح</option>
                <option value="Reserved">محجوز</option>
                <option value="Approved">معتمد</option>
            </select>
        </div>
    </div>

    <div class="ideas-grid">
        <app-idea-card *ngFor="let idea of filteredIdeas" [idea]="idea"></app-idea-card>
    </div>

    <div *ngIf="filteredIdeas.length === 0" class="no-results">
        <p>لا توجد نتائج تطابق بحثك.</p>
    </div>
</div>
