<div class="idea-card card" [ngClass]="'status-' + idea.status.toLowerCase()">
    <div class="card-header">
        <span class="category-badge">{{ idea.category }}</span>
        <span class="status-badge">{{ getStatusArabic(idea.status) }}</span>
    </div>

    <h3 class="idea-title">{{ idea.title }}</h3>
    <p class="idea-description">{{ idea.description | slice:0:120 }}{{ idea.description.length > 120 ? '...' : '' }}</p>

    <div class="idea-meta">
        <div class="meta-item">
            <span class="label">المشرف:</span>
            <span class="value">{{ idea.supervisorName }}</span>
        </div>
        <div class="meta-item">
            <span class="label">الصعوبة:</span>
            <span class="value difficulty" [ngClass]="idea.difficulty.toLowerCase()">{{
                getDifficultyArabic(idea.difficulty) }}</span>
        </div>
    </div>

    <div class="card-footer">
        <a [routerLink]="['/ideas', idea.id]" class="btn btn-primary">عرض التفاصيل</a>
        <span class="team-size">فريق: {{ idea.maxTeamSize }} طلاب</span>
    </div>
</div>
